<!-- add-new-lead.page.html -->

<ion-header class="custom-header">
  <ion-toolbar>
    <div class="header-row">
      <ion-icon name="chevron-back-outline" (click)="goBack()"></ion-icon>
      <h1>Add New Lead</h1>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="add-lead-content">
  <div class="page-wrapper">
    <!-- INFO CARD -->
    <div class="info-card">
      <div class="info-row">
        <ion-icon name="person-add-outline"></ion-icon>
        <div>
          <h2>Add Lead Information</h2>
          <p>Enter the lead details below.You can update the status later.</p>
        </div>
      </div>
    </div>
    <!-- NAME -->
    <div class="input-card">
      <div class="field-block">
        <label class="input-label required">Lead Name</label>
        <div class="custom-input" [class.input-focused]="nameFocused">
          <input type="text" placeholder="Enter lead name" [(ngModel)]="leadJson.lead_name" (focus)="nameFocused = true" (blur)="nameFocused = false"/>
        </div>
      </div>
    </div>
    <!-- PHONE -->
    <div class="input-card">
      <div class="field-block"> 
        <label class="input-label required">Phone Number</label>
        <div class="custom-input" [class.input-focused]="phoneFocused">
          <input type="text" placeholder="Enter 10-digit mobile number" [(ngModel)]="leadJson.phone_number" (focus)="phoneFocused = true" (blur)="phoneFocused = false"/>
        </div>
      </div>
    </div>
    <!-- PRODUCT -->
    <div class="input-card">
      <div class="field-block">
        <label class="input-label required">Product</label>
        <div class="custom-select" [class.input-focused]="productFocused">
          <select [(ngModel)]="leadJson.product_id" (focus)="productFocused = true" (blur)="productFocused = false">
            <option value="" *ngFor="let product of product_data" [value]="product.id">
              {{product.DRIVE_MODEL}}
            </option>
          </select>
          <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
      </div>
    </div>
    <!-- BUTTON -->
    <button class="save-btn" (click)="add_lead()">
      <ion-icon name="save-outline"></ion-icon>
      <span>Save Lead</span>
    </button>
  </div>
</ion-content>
