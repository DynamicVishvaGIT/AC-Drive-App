<ion-app>
  <ion-router-outlet></ion-router-outlet>
  <ion-tabs  #myTabs (ionTabsDidChange)="getSelectedTab()">
    <ion-tab-bar slot="bottom" selectedTab="{{tab_name}}" *ngIf="tab_name=='vdf-select-tool' || tab_name =='my-quiz'|| tab_name =='home' || tab_name =='my-enquiry'  || tab_name =='my-profile' || tab_name =='my-service-request' || tab_name =='my-leads' || tab_name =='add-new-lead' ">
      <ion-tab-button tab="home">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-tab-button>
  
      <ion-tab-button (click)="goToVDFSelectTool()"><!--tab="vdf-select-tool"-->
        <ion-icon name="calculator-outline"></ion-icon>
        <ion-label >VFD Select</ion-label>
      </ion-tab-button>
  
      <ion-tab-button tab="my-quiz">
        <ion-icon name="book-outline"></ion-icon>
        <ion-label>Quize</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="my-enquiry">
        <ion-icon name="document-text-outline"></ion-icon>
        <ion-label>Enquiry</ion-label>
      </ion-tab-button>
  
      <ion-tab-button tab="my-profile">
        <ion-icon name="person-outline"></ion-icon>
        <ion-label>profile</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-app>
